---
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  # TimescaleDB does not publish EL10 packages yet
  - name: rockylinux9
    image: "antmelekhin/docker-systemd:rockylinux-9"
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/lib/containerd
    cgroupns_mode: host
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  playbooks:
    prepare: ../default/prepare.yml
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
verifier:
  name: ansible
