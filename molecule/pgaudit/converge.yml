---
- name: Converge
  hosts: all
  tasks:
    - name: "Include ansible_postgresql with pgaudit extension"
      ansible.builtin.include_role:
        name: "ansible_postgresql"
      vars:
        pg_config_listen_addresses: '*'
        additional_extension:
          - pgaudit
        pg_hba_user_options:
          - contype: host
            users: all
            source: 127.0.0.1/32
            databases: all
            method: scram-sha-256
