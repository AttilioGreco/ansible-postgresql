---
# defaults file for postgres
postgres_version: 18
pg_config_listen_addresses: localhost
pg_config_port: 5432
pg_config_max_connections: 1024
pg_config_shared_buffers: 128MB
pg_config_temp_buffers: 8MB
pg_config_work_mem: 4MB
pg_config_max_wal_size: 1GB
pg_config_min_wal_size: 256MB
pg_config_log_filename: postgresql-%Y-%m-%d_%H%M%S.log
pg_config_timezone: "Europe/Rome"
pg_config_row: ""
pg_config_shared_preload_libraries:
  - pg_stat_statements
# pg_config_row: |
#   max_connections = 200
#   effective_cache_size = 6GB
#   maintenance_work_mem = 512MB
#   checkpoint_completion_target = 0.9
#   wal_buffers = 16MB
#   default_statistics_target = 100
#   random_page_cost = 1.1
#   effective_io_concurrency = 200
#   work_mem = 10485kB
#   min_wal_size = 1GB
#   max_wal_size = 4GB
#   max_worker_processes = 2
#   max_parallel_workers_per_gather = 1
#   max_parallel_workers = 2
#   max_parallel_maintenance_workers = 1
additional_extension: []
# - postgis
# - timescale
pg_hba_user_options:
  - contype: host
    users: all
    source: 127.0.0.1/32
    databases: all
    method: scram-sha-256
  - contype: host
    users: all
    source: 192.168.100.0/24
    databases: all
    method: scram-sha-256
  - contype: host
    users: all
    source: 192.168.200.0/24
    databases: all
    method: scram-sha-256
  - contype: host
    users: all
    source: 192.169.100.0/24
    databases: all
    method: scram-sha-256

# postgis
postgis_version: 35

