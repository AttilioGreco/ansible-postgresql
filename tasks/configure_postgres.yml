---
- name: Postgresql | configure postgres | configure pg_hba
  community.postgresql.postgresql_pg_hba:
    dest: /var/lib/pgsql/{{ postgres_version }}/data/pg_hba.conf
    contype: "{{ item.contype }}"
    users: "{{ item.users }}"
    source: "{{ item.source }}"
    databases: "{{ item.databases }}"
    method: "{{ item.method }}"
    create: true
  loop: "{{ pg_hba_user_options }}"
  notify:
    - Reload postgresql

- name: Postgresql | configure postgres | configure postgresql-config
  ansible.builtin.template:
    src: postgresql.conf.j2
    dest: /var/lib/pgsql/{{ postgres_version }}/data/postgresql.conf
    owner: postgres
    group: postgres
    mode: "0600"
  notify:
    - Restart postgresql

- name: Postgresql | configure postgres | ensure postgresql service is started and enabled
  ansible.builtin.systemd:
    name: "postgresql-{{ postgres_version }}"
    state: started
    enabled: true
