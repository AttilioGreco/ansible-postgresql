---
- name: Postgres | extension | timescale | import GPG key
  ansible.builtin.rpm_key:
    key: https://packagecloud.io/timescale/timescaledb/gpgkey
    state: present

- name: Postgres | extension | timescale | add timescale repo
  ansible.builtin.template:
    src: installation/timescale.repo.j2
    dest: /etc/yum.repos.d/timescale_timescaledb.repo
    mode: "0644"

- name: Postgres | extension | timescale | install timescaledb
  ansible.builtin.dnf:
    name:
      - timescaledb-2-postgresql-{{ postgres_version }}
    state: present
  notify:
    - Restart postgresql
