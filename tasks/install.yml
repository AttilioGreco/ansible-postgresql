---
- name: Postgres | install | timescale pre-install
  ansible.builtin.set_fact:
    pg_config_shared_preload_libraries: "{{ pg_config_shared_preload_libraries + ['timescaledb'] }}"
  when: '"timescale" in additional_extension'

- name: Postgres | install | import PostgreSQL GPG key
  ansible.builtin.rpm_key:
    key: "https://download.postgresql.org/pub/repos/yum/keys/PGDG-RPM-GPG-KEY-RHEL"
    state: present

- name: Postgres | install | install postgres repo
  ansible.builtin.dnf:
    name: "https://download.postgresql.org/pub/repos/yum/reporpms/EL-{{ ansible_distribution_major_version }}-x86_64/pgdg-redhat-repo-latest.noarch.rpm"
    state: present
    disable_gpg_check: false

- name: Postgres | install | check if postgresql module is already disabled
  ansible.builtin.shell:
    cmd: dnf -qy module list postgresql 2>/dev/null | grep -q '\[d\]'
  register: postgresql_module_disabled
  ignore_errors: true
  changed_when: false
  when: ansible_distribution_major_version | int < 10

- name: Postgres | install | disable postgresql module if not already disabled
  ansible.builtin.command: dnf -qy module disable postgresql
  when:
    - ansible_distribution_major_version | int < 10
    - postgresql_module_disabled.rc | default(0) != 0
  changed_when: true

- name: Postgres | install | install postgresql
  ansible.builtin.dnf:
    name:
      - postgresql{{ postgres_version }}
      - postgresql{{ postgres_version }}-server
      - postgresql{{ postgres_version }}-contrib
    state: present

- name: Postgres | install | epel-release
  ansible.builtin.dnf:
    name: epel-release
    state: present

- name: Postgres | install | install custom extension
  ansible.builtin.include_tasks: "extension/{{ item }}.yaml"
  loop: "{{ additional_extension }}"
